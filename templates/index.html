<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Jetson Voice Secure</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .video-box { flex: 1; position: relative; background: #111; display: flex; justify-content: center; }
        #video-feed { height: 100%; width: auto; max-width: 100%; object-fit: contain; }
        .status-overlay { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; }
        
        .footer { height: 200px; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid #333; }
        .input-bar { display: flex; gap: 10px; align-items: center; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; width: 120px; text-align: center; }
        
        #record-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: #ff3b30; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); transition: 0.3s;
        }
        #record-btn:active { transform: scale(0.9); }
        #record-btn.recording { animation: pulse 1s infinite; background: #ff0000; }
        
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,0,0,0.4); } 50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,0,0,0.6); } 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,0,0,0.4); } }
        
        .mode-toggle { font-size: 14px; color: #666; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="video-box">
        <div class="status-overlay" id="status-display">READY</div>
        <img id="video-feed" src="/video_feed">
    </div>

    <div class="footer">
        <div class="input-bar">
            <input type="text" id="username" value="Jerry" placeholder="使用者名稱">
            <span class="mode-toggle" id="mode-text" onclick="toggleMode()">切換至註冊模式</span>
        </div>
        
        <button id="record-btn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="white">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>
        <div style="font-size: 12px; color: #444;">FJU NV-JETSON SYSTEM</div>
    </div>

    <script>
        let isRegister = false;
        let step = 1;

        function toggleMode() {
            isRegister = !isRegister;
            document.getElementById('mode-text').innerText = isRegister ? "切換至驗證模式" : "切換至註冊模式";
            document.getElementById('status-display').innerText = isRegister ? "REGISTRATION MODE" : "READY";
            document.getElementById('status-display').style.color = isRegister ? "#ff9500" : "#fff";
            step = 1;
        }

        async function startProcess() {
            const btn = document.getElementById('record-btn');
            const status = document.getElementById('status-display');
            const name = document.getElementById('username').value;
            
            btn.classList.add('recording');
            status.innerText = isRegister ? `RECORDING (${step}/3)` : "LISTENING...";

            const url = isRegister ? '/api/register' : '/api/verify';
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name, step: step })
            });
            const data = await res.json();
            
            btn.classList.remove('recording');

            if (data.status === "success") {
                status.innerText = "LOGIN SUCCESS";
                status.style.color = "#4cd964";
                setTimeout(() => window.location.href = "/dashboard", 800);
            } else if (data.status === "next") {
                step = data.step;
                status.innerText = `NEXT RECORDING (${step}/3)`;
            } else if (data.status === "completed") {
                alert("註冊完成！請切換回驗證模式");
                toggleMode();
            } else if (data.status === "failed") {
                status.innerText = `FAILED (${data.count}/3)`;
                status.style.color = "#ff3b30";
            } else if (data.status === "locked") {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
